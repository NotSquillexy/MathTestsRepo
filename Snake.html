<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overscroll-behavior: none;
            touch-action: none;
            overflow: hidden;
        }
        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center font-sans">

    <div class="w-full max-w-md p-4 flex flex-col items-center">
        <!-- Header -->
        <div class="flex justify-between items-center w-full mb-4 px-2">
            <h1 class="text-2xl font-black italic text-emerald-400 tracking-tighter">NEON SNAKE</h1>
            <div class="flex gap-2">
                <div class="text-sm font-bold bg-slate-900 border border-slate-800 px-3 py-1 rounded-full">
                    Score: <span id="currentScore" class="text-emerald-400">0</span>
                </div>
                <div class="text-sm font-bold bg-slate-900 border border-slate-800 px-3 py-1 rounded-full">
                    Best: <span id="highScore" class="text-yellow-400">0</span>
                </div>
            </div>
        </div>

        <!-- Game Canvas Container -->
        <div class="relative rounded-xl overflow-hidden border-4 border-slate-800 bg-black">
            <canvas id="gameCanvas" width="400" height="400" class="w-full h-auto block"></canvas>
            
            <!-- Start/Game Over Screen -->
            <div id="overlay" class="absolute inset-0 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center text-center p-6 transition-opacity duration-300">
                <h2 id="overlayTitle" class="text-4xl font-black mb-2 text-white italic">READY?</h2>
                <p id="overlayMessage" class="text-slate-400 mb-8 px-4">Use <b>Arrow Keys</b> or <b>Swipe</b> to move!</p>
                <button id="startBtn" class="px-10 py-4 bg-emerald-500 hover:bg-emerald-400 text-black font-black rounded-full transition-all transform hover:scale-105 active:scale-95 uppercase tracking-widest">
                    Start Game
                </button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="grid grid-cols-3 gap-2 mt-6 md:hidden">
            <div></div>
            <button onclick="changeDirection('up')" class="w-14 h-14 bg-slate-800 rounded-xl flex items-center justify-center">▲</button>
            <div></div>
            <button onclick="changeDirection('left')" class="w-14 h-14 bg-slate-800 rounded-xl flex items-center justify-center">◀</button>
            <button onclick="changeDirection('down')" class="w-14 h-14 bg-slate-800 rounded-xl flex items-center justify-center">▼</button>
            <button onclick="changeDirection('right')" class="w-14 h-14 bg-slate-800 rounded-xl flex items-center justify-center">▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('currentScore');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayMessage = document.getElementById('overlayMessage');
        const startBtn = document.getElementById('startBtn');

        // Game Configuration
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snake_highscore')) || 0;
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        
        let gameActive = false;
        let gameSpeed = 100;
        let gameLoopTimeout;

        function init() {
            snake = [{ x: 10, y: 10 }];
            generateFood();
            score = 0;
            dx = 1;
            dy = 0;
            nextDx = 1;
            nextDy = 0;
            scoreEl.textContent = score;
            highScoreEl.textContent = highScore;
            gameActive = true;
            overlay.classList.add('hidden');
            
            if (gameLoopTimeout) clearTimeout(gameLoopTimeout);
            runGame();
        }

        function runGame() {
            if (!gameActive) return;
            
            update();
            draw();
            gameLoopTimeout = setTimeout(runGame, gameSpeed);
        }

        function update() {
            // Apply buffered direction
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                generateFood();
                // Slight speed up
                if (gameSpeed > 60) gameSpeed -= 1;
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines (faint)
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Food
            ctx.fillStyle = '#f43f5e';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#f43f5e';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

            // Snake
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#34d399' : '#059669';
                ctx.shadowBlur = isHead ? 15 : 0;
                ctx.shadowColor = '#34d399';
                
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
                
                // Eyes for the head
                if (isHead) {
                    ctx.fillStyle = 'black';
                    ctx.shadowBlur = 0;
                    if (dx === 1) { // Right
                        ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 4, 3, 3);
                        ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 12, 3, 3);
                    } else if (dx === -1) { // Left
                        ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, 3, 3);
                        ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 12, 3, 3);
                    } else if (dy === -1) { // Up
                        ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, 3, 3);
                        ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 4, 3, 3);
                    } else if (dy === 1) { // Down
                        ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 12, 3, 3);
                        ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 12, 3, 3);
                    }
                }
            });
            ctx.shadowBlur = 0;
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Don't spawn food on snake body
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function gameOver() {
            gameActive = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snake_highscore', highScore);
            }
            
            overlayTitle.textContent = "CRASHED!";
            overlayTitle.classList.add('text-rose-500');
            overlayMessage.innerHTML = `Final Score: ${score}<br>Best: ${highScore}`;
            startBtn.textContent = "Try Again";
            overlay.classList.remove('hidden');
        }

        function changeDirection(dir) {
            if (!gameActive) return;
            switch(dir) {
                case 'up': if (dy === 0) { nextDx = 0; nextDy = -1; } break;
                case 'down': if (dy === 0) { nextDx = 0; nextDy = 1; } break;
                case 'left': if (dx === 0) { nextDx = -1; nextDy = 0; } break;
                case 'right': if (dx === 0) { nextDx = 1; nextDy = 0; } break;
            }
        }

        window.addEventListener('keydown', e => {
            if (!gameActive && e.code === 'Space') init();
            switch(e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });

        startBtn.onclick = init;

        // Simple Touch Support (Swipes)
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, false);

        canvas.addEventListener('touchend', e => {
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) changeDirection('right');
                else changeDirection('left');
            } else {
                if (diffY > 0) changeDirection('down');
                else changeDirection('up');
            }
        }, false);

        window.onload = () => {
            highScoreEl.textContent = highScore;
            draw();
        };
    </script>
</body>
</html>
