<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Resource Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; overflow: hidden; height: 100vh; }
        .data-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .data-card:hover { border-color: rgba(34, 211, 238, 0.4); transform: translateY(-2px); }
        .nav-item { transition: all 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(34, 211, 238, 0.1); color: #22d3ee; border-right: 3px solid #22d3ee; }
        #entryScreen { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
        .input-glow:focus { box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); border-color: #22d3ee; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .admin-only { display: none !important; }
        body.is-manager .admin-only { display: block !important; }
    </style>
</head>
<body class="font-sans">

    <!-- ENTRY SCREEN -->
    <div id="entryScreen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-md data-card p-8 rounded-3xl border border-white/10 shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black italic tracking-tighter text-cyan-400">RESEARCH PORTAL</h1>
                <p id="portalSubtitle" class="text-slate-500 text-xs uppercase tracking-[0.2em] mt-1">Institutional Synchronization Active</p>
            </div>
            <form id="entryForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-slate-400 font-bold mb-1 ml-1">Student / Faculty ID</label>
                    <input type="text" id="nodeUser" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none input-glow transition-all" placeholder="Enter ID">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-slate-400 font-bold mb-1 ml-1">Access Key</label>
                    <input type="password" id="nodeKey" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none input-glow transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="portalSubmitBtn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-3 rounded-xl transition-all uppercase tracking-widest text-sm mt-2 flex items-center justify-center gap-2">
                    Initialize Session
                </button>
            </form>
            <div class="mt-6 flex flex-col items-center gap-4">
                <button onclick="togglePortalMode()" class="text-[10px] text-cyan-400 hover:text-cyan-300 uppercase font-bold tracking-widest">
                    Don't have an ID? Register Here
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="interface" class="hidden flex h-screen w-full">
        <aside class="w-64 bg-slate-950 border-r border-slate-900 flex flex-col">
            <div class="p-6 border-b border-slate-900">
                <h2 class="text-xl font-black italic text-cyan-400">STUDY PORTAL</h2>
            </div>
            <nav class="flex-grow py-6 space-y-1">
                <div onclick="showSection('docs')" class="nav-item px-6 py-3 flex items-center gap-3 text-sm font-bold text-slate-400 active"><span>📰</span> Literature</div>
                <div onclick="showSection('tools')" class="nav-item px-6 py-3 flex items-center gap-3 text-sm font-bold text-slate-400"><span>🛠️</span> Compute</div>
            </nav>
            <div class="p-6 border-t border-slate-900">
                <button onclick="terminateSession()" class="w-full py-2 border border-slate-800 rounded-lg text-[10px] uppercase font-bold text-slate-500">Logout</button>
            </div>
        </aside>
        <main class="flex-grow overflow-y-auto p-8 relative">
            <section id="tab-docs" class="tab-content max-w-4xl mx-auto">
                <header class="mb-8 flex justify-between items-end">
                    <h2 class="text-3xl font-black italic">DATA REPOSITORY</h2>
                    <button onclick="openEntryModal()" class="bg-cyan-500 text-slate-950 px-4 py-2 rounded-lg font-bold text-xs uppercase admin-only">Post Log</button>
                </header>
                <div id="dataStreamContainer" class="space-y-6"></div>
            </section>
            
            <section id="tab-tools" class="tab-content hidden">
                <h2 class="text-3xl font-black italic mb-8">COMPUTE MODULES</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onclick="initModule('Snake.html')" class="data-card rounded-2xl p-5 cursor-pointer group">
                        <div class="h-32 bg-emerald-900/20 rounded-xl mb-4 flex items-center justify-center text-4xl">🐍</div>
                        <h3 class="font-bold">Logic: Neon Snake</h3>
                        <p class="text-slate-500 text-xs mt-1 uppercase">Institutional Simulation</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- VIEWPORT FOR MODULES -->
    <div id="portalViewport" class="fixed inset-0 bg-black z-[150] hidden flex-col">
        <div class="bg-slate-950 p-4 flex justify-between items-center border-b border-slate-900">
            <button onclick="closePortalModule()" class="text-slate-500 hover:text-white font-bold uppercase text-[10px]">← Exit</button>
            <div id="viewportTitle" class="font-black italic text-cyan-400">MODULE ACTIVE</div>
            <div class="w-10"></div>
        </div>
        <iframe id="viewportFrame" src="" class="flex-grow border-none w-full h-full"></iframe>
    </div>

    <!-- PUBLISH MODAL -->
    <div id="entryModal" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-md hidden items-center justify-center p-6">
        <div class="data-card w-full max-w-lg p-8 rounded-3xl">
            <h2 class="text-2xl font-black italic text-cyan-400 mb-6 uppercase">Broadcast Log</h2>
            <div class="space-y-4">
                <input type="text" id="entryTitle" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white" placeholder="Subject">
                <textarea id="entryBody" rows="5" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white" placeholder="Notes..."></textarea>
                <div class="flex gap-4">
                    <button onclick="closeEntryModal()" class="flex-1 py-3 rounded-xl border border-slate-800 font-bold text-xs">CANCEL</button>
                    <button onclick="publishEntry()" class="flex-1 py-3 rounded-xl bg-cyan-500 text-slate-950 font-black text-xs">SYNC</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5jic6d7ohWqzZzmaidux1qoHfmlBOaGs",
            authDomain: "squillexy-8fe0c.firebaseapp.com",
            projectId: "squillexy-8fe0c",
            storageBucket: "squillexy-8fe0c.firebasestorage.app",
            messagingSenderId: "381813182750",
            appId: "1:381813182750:web:382b1dd8b8c65a17fdf90f",
            measurementId: "G-BC4Z2DFJB7"
        };
        
        // Updated appId to match your project ID for correct document paths
        const appId = 'squillexy-8fe0c'; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserData = null;
        let isRegistrationMode = false;

        const getIdentityRef = (id) => doc(db, 'artifacts', appId, 'public', 'data', 'identities', id.toLowerCase());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const savedId = localStorage.getItem('portal_user_identity');
                if (savedId) {
                    const snap = await getDoc(getIdentityRef(savedId));
                    if (snap.exists()) loginSuccess(snap.data());
                }
            } else {
                await signInAnonymously(auth);
            }
        });

        window.togglePortalMode = () => {
            isRegistrationMode = !isRegistrationMode;
            document.getElementById('portalSubtitle').textContent = isRegistrationMode ? "Registration Interface" : "Institutional Synchronization Active";
        };

        document.getElementById('entryForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('nodeUser').value.trim();
            const key = document.getElementById('nodeKey').value.trim();
            
            try {
                const userRef = getIdentityRef(id);
                const userSnap = await getDoc(userRef);

                if (isRegistrationMode) {
                    if (userSnap.exists()) throw new Error("ID TAKEN");
                    const data = { username: id, key: key, level: id.toLowerCase() === 'admin' ? 'root' : 'base' };
                    await setDoc(userRef, data);
                    alert("Account Created. Please log in now.");
                    window.togglePortalMode();
                } else {
                    if (!userSnap.exists() || userSnap.data().key !== key) throw new Error("ACCESS DENIED");
                    localStorage.setItem('portal_user_identity', id);
                    loginSuccess(userSnap.data());
                }
            } catch (err) { alert(err.message); }
        };

        const loginSuccess = (data) => {
            currentUserData = data;
            document.getElementById('entryScreen').classList.add('hidden');
            document.getElementById('interface').classList.remove('hidden');
            if (data.level === 'root') document.body.classList.add('is-manager');
            startFeed();
        };

        const startFeed = () => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'publications'), (snap) => {
                const container = document.getElementById('dataStreamContainer');
                container.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    container.innerHTML += `<div class="data-card p-6 rounded-2xl border-l-4 border-cyan-500">
                        <h3 class="font-bold text-xl">${p.title}</h3>
                        <p class="text-slate-400 text-sm mt-2">${p.body}</p>
                        <div class="mt-4 text-[10px] text-slate-500 uppercase">Researcher: ${p.author}</div>
                    </div>`;
                });
            }, (err) => console.error("Firestore error:", err));
        };

        window.publishEntry = async () => {
            const title = document.getElementById('entryTitle').value;
            const body = document.getElementById('entryBody').value;
            if (!title || !body) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'publications'), {
                title, body, author: currentUserData.username, timestamp: serverTimestamp()
            });
            window.closeEntryModal();
        };

        window.initModule = (path) => {
            document.getElementById('viewportFrame').src = path;
            document.getElementById('portalViewport').classList.remove('hidden');
            document.getElementById('portalViewport').classList.add('flex');
        };

        window.closePortalModule = () => { 
            document.getElementById('portalViewport').classList.add('hidden');
            document.getElementById('viewportFrame').src = "";
        };

        window.showSection = (id) => {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
            document.getElementById(`tab-${id}`).classList.remove('hidden');
        };

        window.openEntryModal = () => document.getElementById('entryModal').classList.remove('hidden');
        window.closeEntryModal = () => document.getElementById('entryModal').classList.add('hidden');
        window.terminateSession = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
